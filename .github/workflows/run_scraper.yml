name: EGX Live Automation Engine

on:
  workflow_dispatch:      # للتشغيل اليدوي الفوري
  schedule:
    - cron: '*/5 7-12 * * 0-4' # فحص آلي مجدول كل 5 دقائق أثناء الجلسة

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    # إعطاء صلاحيات الكتابة للسيرفر مباشرة من داخل الكود لتفادي خطأ 128
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - name: Copy Repository Files
      uses: actions/checkout@v4

    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Analysis Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas lxml html5lib

    - name: Execute Smart Scraper Engine
      run: python scraper.py

    - name: Push Live JSON Data to GitHub Pages
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # حيلة ذكية: تأكيد وجود الملف حتى لو فشل السكرابر في كتابته بسبب إغلاق السيرفر
        if [ ! -f egx_market_data.json ]; then
          echo "{}" > egx_market_data.json
        fi
        
        git add egx_market_data.json
        git commit -m "تحديث السيولة الحية كل 30 ثانية" || exit 0
        git push origin main
