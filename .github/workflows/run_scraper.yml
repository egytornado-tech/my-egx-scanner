name: EGX Live Automation Engine

on:
  workflow_dispatch:      # يسمح لك بالتشغيل اليدوي الفوري في أي وقت
  schedule:
    - cron: '*/5 7-12 * * 0-4' # فحص آلي مجدول كل 5 دقائق كاحتياطي أثناء الجلسة

env:
  # فرض بيئة التشغيل الحديثة لمنع التحذيرات والتوقف المستقبلي
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
    # ترقية الـ Checkout إلى v4 المتوافقة تماماً مع Node 24
    - name: Copy Repository Files
      uses: actions/checkout@v4

    # ترقية الـ Setup-Python إلى v5 المتوافقة تماماً مع Node 24
    - name: Initialize Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Data Analysis Libraries
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas lxml html5lib

    - name: Execute Smart Scraper Engine
      run: python scraper.py

    - name: Push Live JSON Data to GitHub Pages
      run: |
        git config --global user.name "EGX Automated Bot"
        git config --global user.email "bot@egx-radar.com"
        git add egx_market_data.json
        # الكود مؤمن هنا: إذا لم تكن هناك تغييرات في الداتا لا يفشل السكريبت
        git diff-index --quiet HEAD || (git commit -m "تحديث السيولة الحية كل 30 ثانية" && git push)
