name: EGX Live Automation Engine

on:
  workflow_dispatch: # للتشغيل اليدوي بنجاح
  schedule:
    - cron: '*/30 * * * *' # التكرار الآلي الخاص بك

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    # إجبار البيئة على استخدام جافا سكريبت الحديثة لتفادي خطأ منصة جيت هاب ديبكيشن
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    # 1. تحديث الأكشن لنسخة v4 المتوافقة مع نود 24
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    # 2. تحديث أكشن البايثون لنسخة v5 الحديثة
    - name: Setup Dynamic Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. تثبيت المكتبات المطلوبة للتعامل مع الجداول والويب
    - name: Install Critical Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas lxml html5lib

    # 4. تشغيل السكرابر الآمن الذي قمنا بحمايته
    - name: Execute Smart Scraper Engine
      run: python scraper.py

    # 5. رفع ملف الـ JSON للمستودع وتحديث الموقع تلقائياً
    - name: Commit and Push Updated EGX Json
      run: |
        git config --local user.email "actions@github.com"
        git config --local user.name "github-actions[bot]"
        git add egx_market_data.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "تحديث السيولة الحية كل 30 ثانية" && git push)
