name: 🔄 تحديث رادار السيولة اللحظي أونلاين عبر EGXpilot

on:
  schedule:
    - cron: '*/5 * * * *' # السيرفر يعمل تلقائياً كل 5 دقائق على السحابة
  workflow_dispatch: # يتيح لك التشغيل الفوري يدوياً من تبويب Actions

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
    - name: 📥 سحب الكود الحالي
      uses: actions/checkout@v4

    - name: 🐍 تهيئة بيئة Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 📦 تثبيت مكتبة Requests
      run: pip install requests

    - name: ⚡ تشغيل محرك الكشط السحابي
      run: python scraper.py

    - name: 💾 دفع وحفظ البيانات في المستودع الأونلاين
      run: |
        git config --global user.name "EGXpilot Cloud Bot"
        git config --global user.email "cloud-engine@egxpilot.com"
        git add data.json
        git commit -m "🔄 تحديث سحابي تلقائي لبيانات الرادار [EGXpilot Feed]" || exit 0
        git push
