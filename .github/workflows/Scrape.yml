name: Stock Market Scanner Automation

# 1. إعدادات وقت التشغيل التلقائي (الكرون جوب الذي قمنا بتعديله)
on:
  schedule:
    # من الساعة 10:05 صباحاً إلى 10:55 صباحاً بتوقيت مصر (7:05 إلى 7:55 بتوقيت UTC)
    - cron: '5-55/5 7 * * 0-4'
    
    # من الساعة 11:00 صباحاً إلى 1:55 مساءً بتوقيت مصر (8:00 إلى 10:55 بتوقيت UTC)
    - cron: '*/5 8-10 * * 0-4'
    
    # من الساعة 2:00 مساءً إلى 2:35 مساءً بتوقيت مصر (11:00 إلى 11:35 بتوقيت UTC)
    - cron: '0-35/5 11 * * 0-4'
    
  # يتيح لك هذا الخيار تشغيل السكريبت يدوياً في أي وقت من موقع GitHub للتجربة
  workflow_dispatch: 

# 2. الخطوات التي يقوم بها السيرفر الافتراضي لتشغيل تطبيقك
jobs:
  run-scanner-job:
    runs-on: ubuntu-latest

    steps:
      # سحب الكود من المستودع
      - name: Checkout repository code
        uses: actions/checkout@v4

      # إعداد البيئة (مثال إذا كان تطبيقك يعمل بـ Node.js أو Python)
      - name: Set up Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # تثبيت الحزم وتشغيل السكريبت لجلب البيانات من السيرفر المحلي
      - name: Install Dependencies and Run Scanner
        run: |
          npm install
          npm run start
