<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 رادار أحجام التداول</title>
    <style>
        :root {
            --bg: #f4f7f5;           /* لون ربيعي عاجي موحد لكل الصفحة */
            --text-main: #2d3b32;    /* نص زيتي داكن */
            --text-sub: #5a6e60;     /* نص فرعي رمادي مخضر */
            --green-spring: #2e7d32; /* أخضر عشبي مريح للموجب */
            --red-spring: #c62828;   /* أحمر مرجاني مريح للسالب */
            --th-bg: #e8f5e9;        /* خلفية رأس الجدول */
            --border: #e2ebd5;       /* لون الفواصل الخفيفة */
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            padding: 8px; 
            margin: 0; 
            -webkit-text-size-adjust: 100%;
        }
        
        .container { 
            width: 100%; 
            max-width: 480px; /* مقاس مثالي ومدمج لعرض الموبايل بدون زووم */
            margin: auto; 
        }
        
        .header-zone {
            text-align: center;
            margin-bottom: 12px;
            padding-top: 6px;
        }
        
        h2 { 
            font-size: 1.15rem; 
            color: #1b2e22; 
            margin: 0 0 4px 0; 
            font-weight: 700; 
        }
        
        .update-ticker { 
            font-size: 0.78rem; 
            color: var(--text-sub); 
            background: #e8f5e9;
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
            border: 1px solid var(--border);
        }
        
        .update-time {
            color: var(--green-spring);
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.78rem; /* حجم خط مدمج ومناسب للشاشات الصغيرة */
            background: var(--bg);
        }
        
        th, td { 
            padding: 8px 4px; /* مسافات مضغوطة لمنع التمدد */
            text-align: center; 
            border-bottom: 1px solid #eef3ed; 
            white-space: nowrap; /* منع انقسام أرقام الأسعار والأحجام */
        }
        
        th { 
            background: var(--th-bg); 
            color: #2e4a36; 
            font-weight: 600; 
            cursor: pointer; 
            user-select: none;
        }
        
        th::after { content: ' ⇅'; font-size: 0.65rem; color: #a1c1a8; }
        
        td.symbol-cell { 
            text-align: right; 
            font-weight: 600; 
            white-space: normal; /* السماح لاسم السهم بالالتفاف لو كان طويلاً */
            max-width: 110px;    /* حد أقصى لعرض عمود الاسم لضمان ثبات الجدول */
            color: #1b2e22;
        }
        
        .pos { color: var(--green-spring); font-weight: 600; }
        .neg { color: var(--red-spring); font-weight: 600; }
        
        .badge { 
            font-size: 0.6rem; 
            padding: 1px 3px; 
            border-radius: 4px; 
            background: #fff; 
            color: #689f38; 
            border: 1px solid #dcedc8;
            display: inline-block;
            margin-top: 2px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-zone">
        <h2>📊 رادار أحجام التداول اللحظية</h2>
        <div class="update-ticker">
            آخر تحديث ناجح: <span id="last-update" class="update-time">جاري الجلب...</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th onclick="sortTable(0)" style="text-align: right; width: 30%;">السهم</th>
                <th onclick="sortTable(1)">السعر</th>
                <th onclick="sortTable(2)">%</th>
                <th onclick="sortTable(3)">اليوم</th>
                <th onclick="sortTable(4)">أمس</th>
                <th onclick="sortTable(5)">النسبة</th>
            </tr>
        </thead>
        <tbody id="comparison-rows">
            <tr><td colspan="6" style="color: var(--text-sub); padding: 20px;">جاري جلب البيانات الفورية...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let rawData = [];
    let currentSortCol = -1;
    let sortAscending = true;

    async function loadComparisonResults() {
        try {
            const response = await fetch('volume_comparison.json?t=' + new Date().getTime());
            if (response.ok) {
                const data = await response.json();
                rawData = Object.entries(data).map(([symbol, metrics]) => ({ symbol, ...metrics }));
                renderTable(rawData);
                
                // تحديث مؤشر التوقيت اللحظي فور النجاح
                const now = new Date();
                const timeString = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                document.getElementById('last-update').innerText = timeString;
            }
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
        }
    }

    function renderTable(items) {
        let html = "";
        items.forEach(item => {
            const ratio = item.ratio_percentage;
            const ratioClass = ratio >= 100 ? "pos" : "neg";
            const changeClass = item.price_change >= 0 ? "pos" : "neg";
            const fallbackTag = item.is_fallback_baseline ? '<br><span class="badge">تقديري</span>' : '';
            const price = item.price ? item.price.toFixed(2) : "-";
            const change = item.price_change !== undefined ? (item.price_change > 0 ? "+" : "") + item.price_change + "%" : "-";

            html += `
                <tr>
                    <td class="symbol-cell">${item.symbol} ${fallbackTag}</td>
                    <td style="font-weight: 600;">${price}</td>
                    <td class="${changeClass}">${change}</td>
                    <td style="color: #1b5e20; font-weight: 600;">${parseInt(item.current_volume).toLocaleString()}</td>
                    <td style="color: #555;">${parseInt(item.compared_to_time_volume).toLocaleString()}</td>
                    <td class="${ratioClass}">${ratio}%</td>
                </tr>
            `;
        });
        document.getElementById('comparison-rows').innerHTML = html;
    }

    function sortTable(colIndex) {
        if (currentSortCol === colIndex) {
            sortAscending = !sortAscending;
        } else {
            currentSortCol = colIndex;
            sortAscending = true;
        }

        rawData.sort((a, b) => {
            let valA, valB;
            if (colIndex === 0) { valA = a.symbol; valB = b.symbol; }
            if (colIndex === 1) { valA = a.price; valB = b.price; }
            if (colIndex === 2) { valA = a.price_change; valB = b.price_change; }
            if (colIndex === 3) { valA = a.current_volume; valB = b.current_volume; }
            if (colIndex === 4) { valA = a.compared_to_time_volume; valB = b.compared_to_time_volume; }
            if (colIndex === 5) { valA = a.ratio_percentage; valB = b.ratio_percentage; }

            if (typeof valA === 'string') {
                return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                return sortAscending ? valA - valB : valB - valA;
            }
        });

        renderTable(rawData);
    }

    loadComparisonResults();
    setInterval(loadComparisonResults, 60000);
</script>
</body>
</html>
