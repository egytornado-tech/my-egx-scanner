<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 رادار العربية للأسمنت الحصري (ARCC)</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --border: #30363d; --text: #c9d1d9; --green: #2ea043; --blue: #58a6ff; --orange: #f0883e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; padding: 10px; margin: 0; text-align: center; }
        .container { max-width: 100%; margin: auto; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { font-size: 1.5rem; color: #fff; margin-bottom: 2px; }
        .stock-title { font-size: 1.1rem; color: var(--orange); font-weight: bold; margin-bottom: 10px; }
        
        .status-container { background: #21262d; border: 1px solid var(--border); border-radius: 8px; padding: 8px; margin-bottom: 15px; font-size: 0.85rem; }
        .status-text { color: var(--blue); font-weight: bold; margin-bottom: 4px; }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; width: 80%; margin: 5px auto 0 auto; }
        .progress-fill { height: 100%; background: var(--blue); width: 0%; transition: width 0.3s ease; }
        
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .metric-box { background: #21262d; border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .metric-box span { display: block; font-size: 0.8rem; color: #8b949e; margin-bottom: 4px; }
        .metric-box b { font-size: 1.3rem; color: #fff; }
        .signal-box { padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem; border: 1px solid var(--border); margin-top: 10px; }
        .accumulation { background: rgba(46, 160, 67, 0.15); color: #58a6ff; border-color: var(--green); }
        .normal { background: #21262d; color: var(--text); }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>🎯 رادار الحوت الأحادي</h1>
        <div class="stock-title">العربية للأسمنت (ARCC)</div>
        
        <div class="status-container">
            <div id="connection-status" class="status-text">🔄 تهيئة الفحص اللحظي الرقمي...</div>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
        </div>

        <div class="metric-grid">
            <div class="metric-box">
                <span>آخر سعر لحظي حقيقي</span>
                <b id="live-price">0.00 ج.م</b>
            </div>
            <div class="metric-box">
                <span>حجم التداول الفعلي اليوم</span>
                <b id="live-volume">0</b>
            </div>
        </div>

        <div class="metric-grid">
            <div class="metric-box">
                <span>متوسط 30 يوم الدقيق</span>
                <b id="avg-30days" style="color: var(--orange);">692,690</b>
            </div>
            <div class="metric-box">
                <span>مضاعف السيولة (Volume X)</span>
                <b id="volume-multiplier" style="color: var(--blue);">0.00X</b>
            </div>
        </div>

        <div id="signal-display" class="signal-box normal">
            بانتظار مطابقة خلايا صانع السوق...
        </div>
    </div>
</div>

<script>
    const REAL_URL = "http://41.33.162.236/egs4/";
    const CORS_PROXY_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent(REAL_URL);
    
    const TARGET_KEYWORD = "العربية للأسمنت";
    const HISTORICAL_AVG_30_DAYS = 692690; 

    function updateProgress(stepName, percent, color = '#58a6ff') {
        const textEl = document.getElementById('connection-status');
        const fillEl = document.getElementById('progress-fill');
        textEl.innerText = stepName;
        textEl.style.color = color;
        fillEl.style.width = percent + "%";
        fillEl.style.background = color;
    }

    async function scanARCCStock() {
        try {
            updateProgress("📡 المرحلة 1/4: جاري استدعاء صفقات السيرفر الحالي...", 25);
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);

            const res = await fetch(CORS_PROXY_URL + "&cacheBust=" + new Date().getTime(), { signal: controller.signal });
            clearTimeout(timeoutId);

            if (!res.ok) throw new Error("تأخر استجابة");
            
            updateProgress("📥 المرحلة 2/4: فك تشفير مصفوفة البيانات...", 50);
            const htmlText = await res.text();
            
            updateProgress("🔍 المرحلة 3/4: مسح ديناميكي لمواقع العناوين...", 75);
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const table = doc.querySelector('table');
            
            if (table) {
                const rows = Array.from(table.querySelectorAll('tr'));
                if (rows.length < 2) return;

                // 🌟 كشف ديناميكي لمؤشرات الأعمدة بناءً على نص العنوان الصريح بسيرفرك
                let volumeIndex = -1;
                let priceIndex = -1;

                // فحص أول صفين للبحث عن العناوين الحقيقية (حجم_التداول و آخر_سعر)
                for (let i = 0; i < Math.min(rows.length, 3); i++) {
                    const cellTexts = Array.from(rows[i].querySelectorAll('td')).map(td => td.innerText.trim());
                    
                    const vIdx = cellTexts.findIndex(txt => txt.includes("حجم_التداول"));
                    const pIdx = cellTexts.findIndex(txt => txt.includes("آخر_سعر"));
                    
                    if (vIdx !== -1) volumeIndex = vIdx;
                    if (pIdx !== -1) priceIndex = pIdx;
                }

                // خطة احتياطية صارمة بناءً على التحليل البرمجي المعكوس لصور الشاشة إذا فشل الكشف التلقائي
                if (volumeIndex === -1) volumeIndex = rows[0].querySelectorAll('td').length - 1; // آخر عمود برمجياً في الـ HTML
                if (priceIndex === -1) priceIndex = rows[0].querySelectorAll('td').length - 3;  // العمود الثالث من النهاية

                let found = false;

                rows.forEach(row => {
                    const cells = Array.from(row.querySelectorAll('td')).map(td => td.innerText.trim());
                    const rowText = cells.join(" ");
                    
                    if (rowText.includes(TARGET_KEYWORD) && cells.length > Math.max(volumeIndex, priceIndex)) {
                        found = true;
                        
                        // 📊 اقتناص حجم التداول والآخر سعر بناءً على المؤشرات المؤكدة
                        const volume = parseInt(cells[volumeIndex].replace(/,/g, '')) || 0;
                        const price = parseFloat(cells[priceIndex].replace(/,/g, '')) || 0;
                        
                        const volX = (volume / HISTORICAL_AVG_30_DAYS).toFixed(2);
                        
                        document.getElementById('live-price').innerText = price.toFixed(2) + " ج.م";
                        document.getElementById('live-volume').innerText = volume.toLocaleString();
                        document.getElementById('volume-multiplier').innerText = volX + "X";
                        
                        const signalDisplay = document.getElementById('signal-display');
                        
                        if (volX >= 1.5) {
                            signalDisplay.innerText = `🚨 🔥 [تجميع مؤسسي عنيف] السهم يتجاوز متوسط 30 يوم بـ 50%+`;
                            signalDisplay.className = "signal-box accumulation";
                        } else if (volX >= 1.0) {
                            signalDisplay.innerText = `🟢 [اختراق السيولة] حجم تداول اليوم تخطى كامل متوسط الـ 30 يوم بنجاح!`;
                            signalDisplay.className = "signal-box accumulation";
                        } else if (volX >= 0.5) {
                            signalDisplay.innerText = `🟡 [سيولة متوسطة] تداولات اليوم تجاوزت نصف المتوسط الشهري وننتظر الحوت.`;
                            signalDisplay.className = "signal-box normal";
                        } else {
                            signalDisplay.innerText = `⚪ تداولات اعتيادية هادئة.. صانع السوق يجمع ببطء تحت المتوسط.`;
                            signalDisplay.className = "signal-box normal";
                        }
                    }
                });

                if (found) {
                    updateProgress("⚡ المرحلة 4/4: متصل والمطابقة الديناميكية ناجحة 100%", 100, '#2ea043');
                } else {
                    updateProgress("⚠️ السهم غير متواجد حالياً في نافذة البث المباشر", 100, '#f0883e');
                }
            }
        } catch (err) {
            updateProgress(`🔄 جاري إعادة الاتصال الفوري بالسيرفر...`, 10, '#f0883e');
        }
    }

    setInterval(scanARCCStock, 4000); // تحديث سريع وآمن كل 4 ثوانٍ
    scanARCCStock();
</script>
</body>
</html>
