<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 تقرير أحجام التداول السكرابينج المقارن</title>
    <style>
        :root { 
            --bg: #0d1117; 
            --card: #161b22; 
            --border: #30363d; 
            --text: #c9d1d9; 
            --green: #2ea043; 
            --red: #da3633; 
        }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            padding: 15px; 
            margin: 0; 
            text-align: center; 
        }
        .container { max-width: 600px; margin: auto; }
        .table-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.3); 
        }
        h2 { font-size: 1.2rem; color: #fff; margin-top: 0; margin-bottom: 5px; }
        .subtitle { font-size: 0.8rem; color: #8b949e; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th, td { padding: 10px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background: #21262d; color: #fff; font-weight: bold; }
        td { color: #fff; }
        .pos { color: var(--green); font-weight: bold; }
        .neg { color: var(--red); font-weight: bold; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #30363d; color: #8b949e; margin-right: 5px; }
    </style>
</head>
<body>

<div class="container">
    <div class="table-card">
        <h2>📊 مقارنة أحجام التداول اللحظية (ساعة بساعة)</h2>
        <div class="subtitle">يتم التحديث تلقائياً بناءً على فترات السكرابينج الـ 15 دقيقة</div>
        <table>
            <thead>
                <tr>
                    <th>السهم</th>
                    <th>السعر الحالي</th>
                    <th>حجم اليوم</th>
                    <th>حجم أمس (نفس الوقت)</th>
                    <th>النسبة للهدف</th>
                </tr>
            </thead>
            <tbody id="comparison-rows">
                <tr><td colspan="5" style="color: #8b949e;">جاري قراءة سجلات السكرابينج المحدثة...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    async function loadComparisonResults() {
        try {
            // سحب ملف المقارنة الناتج عن سكريبت البايثون مع كسر الكاش لضمان اللحظية
            const response = await fetch('volume_comparison.json?t=' + new Date().getTime());
            if (response.ok) {
                const data = await response.json();
                let html = "";
                
                for (const [symbol, metrics] of Object.entries(data)) {
                    const ratio = metrics.ratio_percentage;
                    // تلوين النسبة بالأخضر لو تخطت حجم الأمس (100%)، بالأحضر لو أقل
                    const colorClass = ratio >= 100 ? "pos" : "neg";
                    // وسم لتوضيح إذا كانت داتا الأمس حقيقية أم تقديرية (أول يوم تشغيل)
                    const fallbackTag = metrics.is_fallback_baseline ? '<span class="badge">تقديري</span>' : '';
                    const price = metrics.price ? parseFloat(metrics.price).toFixed(2) + " ج.م" : "-";

                    html += `
                        <tr>
                            <td style="text-align: right;"><b>${symbol}</b> ${fallbackTag}</td>
                            <td>${price}</td>
                            <td>${parseInt(metrics.current_volume).toLocaleString()}</td>
                            <td>${parseInt(metrics.compared_to_time_volume).toLocaleString()}</td>
                            <td class="${colorClass}">${ratio}%</td>
                        </tr>
                    `;
                }
                document.getElementById('comparison-rows').innerHTML = html;
            }
        } catch (error) {
            console.error("خطأ أثناء جلب ملف المقارنة اللحظي:", error);
        }
    }

    // تشغيل الجلب الفوري عند تحميل الصفحة
    loadComparisonResults();
    
    // تحديث الواجهة تلقائياً كل دقيقة للتزامن مع أي سحب جديد بدون ريفريش كامة للصفحة
    setInterval(loadComparisonResults, 60000);
</script>
</body>
</html>
