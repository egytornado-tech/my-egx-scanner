<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>📊 رادار التداول</title>
    <style>
        :root {
            --bg: #f4f7f5;
            --text-main: #2d3b32;
            --text-sub: #5a6e60;
            --green-spring: #2e7d32;
            --red-spring: #c62828;
            --th-bg: #e8f5e9;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; 
            padding: 4px; 
            margin: 0; 
            overflow-x: hidden; /* منع التمرير العرضي تماماً */
        }
        
        .container { 
            width: 100%; 
            max-width: 100%;
            margin: auto; 
        }
        
        .header-zone {
            text-align: center;
            margin-bottom: 8px;
        }
        
        h2 { 
            font-size: 1.05rem; 
            color: #1b2e22; 
            margin: 4px 0; 
            font-weight: 700; 
        }
        
        .update-ticker { 
            font-size: 0.72rem; 
            color: var(--text-sub); 
            background: #e8f5e9;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.72rem; /* حجم مدمج ومثالي ومقاوم للـ Scroll */
            table-layout: fixed; /* إجبار الجدول على الالتزام بعرض الشاشة */
        }
        
        th, td { 
            padding: 6px 2px; /* تقليص الحواف الداخلية لأقصى درجة */
            text-align: center; 
            border-bottom: 1px solid #eef3ed; 
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        th { 
            background: var(--th-bg); 
            color: #2e4a36; 
            font-weight: 600; 
            cursor: pointer; 
        }
        
        th::after { content: '⇅'; font-size: 0.6rem; color: #a1c1a8; margin-right: 1px; }
        
        td.symbol-cell { 
            text-align: right; 
            font-weight: 600; 
            white-space: normal; /* السماح لاسم السهم بالنزول لسطر جديد دون مط الجدول عرضياً */
            color: #1b2e22;
        }
        
        .pos { color: var(--green-spring); font-weight: 600; }
        .neg { color: var(--red-spring); font-weight: 600; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-zone">
        <h2>📊 رادار أحجام التداول اللحظية</h2>
        <div class="update-ticker">
            وقت السكراب الفعلي: <span id="last-update" style="color: var(--green-spring);">جاري الجلب...</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <!-- تقسيم نسب الأعمدة بالملي لتتطابق تماماً مع حجم شاشة أي موبايل -->
                <th onclick="sortTable(0)" style="text-align: right; width: 32%;">السهم</th>
                <th onclick="sortTable(1)" style="width: 14%;">السعر</th>
                <th onclick="sortTable(2)" style="width: 12%;">%</th>
                <th onclick="sortTable(3)" style="width: 15%;">الحجم</th>
                <th onclick="sortTable(4)" style="width: 14%;">أمس</th>
                <th onclick="sortTable(5)" style="width: 13%;">النسبة</th>
            </tr>
        </thead>
        <tbody id="comparison-rows">
            <tr><td colspan="6" style="color: var(--text-sub); padding: 15px;">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>
</div>

<script>
    let rawData = [];
    let currentSortCol = -1;
    let sortAscending = true;

    async function loadComparisonResults() {
        try {
            const response = await fetch('volume_comparison.json?t=' + new Date().getTime());
            if (response.ok) {
                const resData = await response.json();
                
                // عرض وقت السكراب الفعلي القادم من السكريبت
                if (resData.scrape_time) {
                    document.getElementById('last-update').innerText = resData.scrape_time;
                }
                
                rawData = Object.entries(resData.stocks).map(([symbol, metrics]) => ({ symbol, ...metrics }));
                renderTable(rawData);
            }
        } catch (error) {
            console.error("خطأ في جلب البيانات:", error);
        }
    }

    function renderTable(items) {
        let html = "";
        items.forEach(item => {
            const ratio = item.ratio_percentage;
            const ratioClass = ratio >= 100 ? "pos" : "neg";
            const changeClass = item.price_change >= 0 ? "pos" : "neg";
            const price = item.price ? item.price.toFixed(1) : "-";
            const change = item.price_change !== undefined ? (item.price_change > 0 ? "+" : "") + item.price_change + "%" : "-";

            html += `
                <tr>
                    <td class="symbol-cell">${item.symbol}</td>
                    <td style="font-weight: 600;">${price}</td>
                    <td class="${changeClass}">${change}</td>
                    <td style="color: #1b5e20; font-weight: 600;">${parseInt(item.current_volume).toLocaleString()}</td>
                    <td style="color: #555;">${parseInt(item.compared_to_time_volume).toLocaleString()}</td>
                    <td class="${ratioClass}">${ratio}%</td>
                </tr>
            `;
        });
        document.getElementById('comparison-rows').innerHTML = html;
    }

    function sortTable(colIndex) {
        if (currentSortCol === colIndex) {
            sortAscending = !sortAscending;
        } else {
            currentSortCol = colIndex;
            sortAscending = true;
        }

        rawData.sort((a, b) => {
            let valA, valB;
            if (colIndex === 0) { valA = a.symbol; valB = b.symbol; }
            if (colIndex === 1) { valA = a.price; valB = b.price; }
            if (colIndex === 2) { valA = a.price_change; valB = b.price_change; }
            if (colIndex === 3) { valA = a.current_volume; valB = b.current_volume; }
            if (colIndex === 4) { valA = a.compared_to_time_volume; valB = b.compared_to_time_volume; }
            if (colIndex === 5) { valA = a.ratio_percentage; valB = b.ratio_percentage; }

            if (typeof valA === 'string') {
                return sortAscending ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
                return sortAscending ? valA - valB : valB - valA;
            }
        });

        renderTable(rawData);
    }

    loadComparisonResults();
    setInterval(loadComparisonResults, 60000);
</script>
</body>
</html>
