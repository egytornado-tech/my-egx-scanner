<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 كاشف التجميع المطور — EGX Money Flow</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        :root { --bg: #090d13; --card: #151b23; --border: #30363d; --text: #f0f6fc; --green: #2ea043; --red: #f85149; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 12px; margin: 0; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 12px; }
        .timeframe-container { display: flex; gap: 8px; margin: 10px 0; }
        .tf-btn { background: #21262d; border: 1px solid var(--border); color: #fff; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .tf-btn.active { background: #1f6feb; border-color: #58a6ff; }
        #chart-wrapper { width: 100%; height: 350px; background: #151b23; border-radius: 6px; overflow: hidden; margin-top: 15px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        th, td { padding: 12px 8px; text-align: right; border-bottom: 1px solid var(--border); }
        th { background: #161b22; color: #8b949e; }
        .badge { padding: 4px 8px; border-radius: 4px; font-weight: bold; }
        .green-badge { background: rgba(46, 160, 67, 0.15); color: #58a6ff; }
        .red-badge { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    </style>
</head>
<body>

    <div class="card">
        <h2>📡 كاشف التجميع المطور</h2>
        <p id="update-timer" style="color: #8b949e; font-size: 0.85rem;">جاري الاتصال بقاعدة البيانات اللحظية...</p>
        
        <div class="timeframe-container">
            <button class="tf-btn" onclick="changeTimeframe('15', this)">15د</button>
            <button class="tf-btn active" onclick="changeTimeframe('30', this)">30د</button>
            <button class="tf-btn" onclick="changeTimeframe('60', this)">ساعة</button>
            <button class="tf-btn" onclick="changeTimeframe('D', this)">يوم</button>
        </div>

        <select id="tickerSelector" onchange="renderActiveChart()" style="width:100%; padding:10px; background:#21262d; color:#fff; border-radius:6px; border:1px solid var(--border);">
            <option value="COMI">البنك التجاري الدولي (COMI)</option>
            <option value="FWRY">فوري للمدفوعات الإلكترونية (FWRY)</option>
            <option value="JUFO">جهينة للصناعات الغذائية (JUFO)</option>
            <option value="SWDY">السويدى اليكتريك (SWDY)</option>
            <option value="TMGH">مجموعة طلعت مصطفى (TMGH)</option>
            <option value="BTFH">بلتون القابضة (BTFH)</option>
        </select>
        
        <div id="chart-wrapper"></div>
    </div>

    <div class="card">
        <h3>📊 الفحص الفني لتدفقات السيولة ومتوسط الفوليوم الديناميكي</h3>
        <table>
            <thead>
                <tr>
                    <th>السهم</th>
                    <th>السعر اللحظي</th>
                    <th>متوسط فوليوم TV</th>
                    <th>الحجم للمتوسط (X)</th>
                    <th>التوصية والنموذج</th>
                </tr>
            </thead>
            <tbody id="signalsTableBody">
                <tr><td colspan="5" style="text-align:center; color:#8b949e;">جاري جلب ملف البيانات المحدث...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        let currentInterval = "30";
        let globalData = {};

        const container = document.getElementById('chart-wrapper');
        const chart = LightweightCharts.createChart(container, {
            width: container.clientWidth || 800,
            height: 350,
            layout: { background: { type: 'solid', color: '#151b23' }, textStyle: { color: '#c9d1d9' } },
            grid: { vertLines: { color: '#21262d' }, horzLines: { color: '#21262d' } },
            timeScale: { borderColor: '#30363d', timeVisible: true }
        });
        
        const candleSeries = chart.addCandlestickSeries({ upColor: '#2ea043', downColor: '#f85149' });

        window.addEventListener('resize', () => { chart.resize(container.clientWidth, 350); });

        // الدالة المعدلة بكسر الكاش الصارم (Anti-Cache Force)
        async function fetchMarketJson() {
            try {
                // إجبار المتصفح على طلب الملف من السيرفر مباشرة وليس من الذاكرة المؤقتة عبر تذييل الوقت اللحظي بالملي ثانية
                const timestamp = new Date().getTime();
                const response = await fetch('egx_market_data.json?v=' + timestamp);
                
                if (!response.ok) {
                    throw new Error("ملف JSON غير موجود أو لم يتم إنشاؤه بعد");
                }
                
                globalData = await response.json();
                
                if (globalData && Object.keys(globalData).length > 0) {
                    renderTable();
                    renderActiveChart();
                    
                    // تحديث توقيت القراءة بالواجهة للتأكد من المزامنة
                    const firstTicker = Object.keys(globalData)[0];
                    document.getElementById('update-timer').innerText = `البورصة المصرية — آخر تحديث آلي للسيرفر: ${globalData[firstTicker].last_update || 'نشط'}`;
                }
            } catch(e) {
                console.error("خطأ قراءة البيانات:", e);
                document.getElementById('signalsTableBody').innerHTML = `<tr><td colspan="5" style="text-align:center; color:#f85149;">⚠️ فشل قراءة الملف: ${e.message}</td></tr>`;
            }
        }

        function renderTable() {
            const tbody = document.getElementById('signalsTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
            
            Object.keys(globalData).forEach(ticker => {
                const stock = globalData[ticker];
                const tr = document.createElement('tr');
                
                const isGreen = stock.signal.includes('🟢') || stock.signal.includes('تجمع');
                const isRed = stock.signal.includes('🔴') || stock.signal.includes('تصريف');
                const badgeStyle = isGreen ? 'green-badge' : (isRed ? 'red-badge' : '');

                tr.innerHTML = `
                    <td><b>${stock.ticker || ticker}</b><br><span style="color:#8b949e; font-size:0.75rem;">${stock.name}</span></td>
                    <td>${stock.price} ج.م</td>
                    <td>${stock.dynamic_avg_vol ? stock.dynamic
